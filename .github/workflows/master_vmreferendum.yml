# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - vmreferendum

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://index.docker.io/v1/
        username: ${{ secrets.AzureAppService_ContainerUsername_a1aa47d7ebee4ec7bdb5d00ee0c9b67d }}
        password: ${{ secrets.AzureAppService_ContainerPassword_5c09691c514c4f298a6616de1c8a3292 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: index.docker.io/${{ secrets.AzureAppService_ContainerUsername_a1aa47d7ebee4ec7bdb5d00ee0c9b67d }}/vmetreveli/referendum:${{ github.sha }}
        file: ./src/vm.referendum.Api/Dockerfile  # Updated to point to the Dockerfile in referendum.api
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'vmreferendum'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_06f734e5406645528efc3a2184c89eee }}
        images: 'index.docker.io/${{ secrets.AzureAppService_ContainerUsername_a1aa47d7ebee4ec7bdb5d00ee0c9b67d }}/vmetreveli/referendum:${{ github.sha }}'
