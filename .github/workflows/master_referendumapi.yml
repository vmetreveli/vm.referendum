# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - referendumapi

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://index.docker.io/v1/
        username: ${{ secrets.AzureAppService_ContainerUsername_75a2195a81b64a00bb215ff4a97dbab3 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_a15177913e8f4fa183f4095be0f63bb5 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: index.docker.io/${{ secrets.AzureAppService_ContainerUsername_75a2195a81b64a00bb215ff4a97dbab3 }}/vmetreveli/vm.referendum:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'referendumapi'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_37ab792e091b4045bcaceb163c0262e5 }}
        images: 'index.docker.io/${{ secrets.AzureAppService_ContainerUsername_75a2195a81b64a00bb215ff4a97dbab3 }}/vmetreveli/vm.referendum:${{ github.sha }}'