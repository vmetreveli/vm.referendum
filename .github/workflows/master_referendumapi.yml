# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - referendumapi

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://index.docker.io/v1/
        username: ${{ secrets.AzureAppService_ContainerUsername_8fd443d93e134d7d9e9561772b044f15 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_648ddaa53e194e5681aa41d4a137480a }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: index.docker.io/${{ secrets.AzureAppService_ContainerUsername_8fd443d93e134d7d9e9561772b044f15 }}/referendum:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'referendumapi'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_d1311bb5867a482a967e8eac31cc02d2 }}
        images: 'index.docker.io/${{ secrets.AzureAppService_ContainerUsername_8fd443d93e134d7d9e9561772b044f15 }}/referendum:${{ github.sha }}'