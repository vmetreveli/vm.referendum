name: Build and deploy container app to Azure Web App - referendumapi

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://index.docker.io/v1/
        username: ${{ secrets.AzureAppService_ContainerUsername_36650115584e4e719ac7e0a20507c9d9 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_808906c49fac4143a6d2f7c91ec15029 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: vmetreveli/vm.referendum:${{ github.sha }}
        file: ./src/vm.referendum.Api/Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'referendumapi'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_860c99e808e1458b8c60bed36c3b1c49 }}
        images: 'vmetreveli/vm.referendum:${{ github.sha }}'
