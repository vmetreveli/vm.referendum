  referendum.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - "ConnectionStrings:DefaultConnection=Server=localhost;Port=5432;Database=Referendum;User Id=admin;Password=admin1234;"
      - "MessageBroker:HostAddress=amqp://guest:guest@rabbitmq:5672"
    depends_on:
      - referendumdb
